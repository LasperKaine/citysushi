<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minä - City Sushi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<header class="header">
    <div class="header-left">
        <button class="back-btn" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="logo">
            <span class="logo-icon">🍣</span> City Sushi
        </div>
    </div>
    
    <div class="header-right">
        <a href="login.html" class="auth-btn btn-login">Kirjaudu</a>
        <a href="register.html" class="auth-btn btn-register">Rekisteröidy</a>
    </div>
</header>

    <div class="screen active">
        <div class="screen-header">
            <h1>Minä</h1>
        </div>

        <div class="profile-header">
            <div class="avatar"></div>
            <h2>Matti Meikäläinen</h2>
            <p>matti@example.com</p>
            <p class="loyalty">Kanta-asiakaspisteet: <strong>245</strong></p>
        </div>

        <div class="menu-list">
            <a href="#" class="menu-item">
                <i class="fas fa-heart"></i>
                <span>Suosikkiannokset</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-history"></i>
                <span>Tilaushistoria</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-credit-card"></i>
                <span>Maksutavat</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Toimitusosoitteet</span>
            </a>
            <a href="#" class="menu-item">
                <i class="fas fa-ticket-alt"></i>
                <span>Kupongit & tarjoukset</span>
            </a>
        </div>

        <button class="btn-secondary full-width" onclick="logout()">Kirjaudu ulos</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Koti</span></a>
        <a href="menu.html" class="nav-item"><i class="fas fa-book"></i><span>Menu</span></a>
        <a href="cart.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Kori</span></a>
        <a href="orders.html" class="nav-item"><i class="fas fa-receipt"></i><span>Tilaukset</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i><span>Minä</span></a>
    </nav>

    <!-- väliaikainen scripti -->

    <script>
        function logout() {
            if (confirm("Haluatko kirjautua ulos?")) {
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
