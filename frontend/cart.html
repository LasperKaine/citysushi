<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kori - City Sushi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<header class="header">
    <div class="header-left">
        <button class="back-btn" onclick="window.location.href='menu.html'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="logo">
            <span class="logo-icon">🍣</span> City Sushi
        </div>
    </div>

    <div class="header-right">
        <a href="login.html" class="auth-btn btn-login">Kirjaudu</a>
        <a href="register.html" class="auth-btn btn-register">Rekisteröidy</a>
    </div>
</header>

    <div class="content">
        <h2 class="section-title">Ostoskori</h2>

        <div class="cart-items">
            <div class="order-card">
                <div class="cart-item">
                    <div class="item-info">
                        <h3>California Roll</h3>
                        <p class="description">Krab, avokado, kurkku, seesami</p>
                        <div class="item-controls">
                            <div class="quantity-controls">
                                <button class="qty-btn">-</button>
                                <span class="quantity">2</span>
                                <button class="qty-btn">+</button>
                            </div>
                            <span class="price">12.50€</span>
                        </div>
                    </div>
                    <button class="remove-btn">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

            <div class="order-card">
                <div class="cart-item">
                    <div class="item-info">
                        <h3>Spicy Tuna Roll</h3>
                        <p class="description">Tonnikala, sriracha, kurkku, nori</p>
                        <div class="item-controls">
                            <div class="quantity-controls">
                                <button class="qty-btn">-</button>
                                <span class="quantity">1</span>
                                <button class="qty-btn">+</button>
                            </div>
                            <span class="price">14.00€</span>
                        </div>
                    </div>
                    <button class="remove-btn">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

            <div class="order-card">
                <div class="cart-item">
                    <div class="item-info">
                        <h3>Salmon Nigiri</h3>
                        <p class="description">Tuore lohi riisillä</p>
                        <div class="item-controls">
                            <div class="quantity-controls">
                                <button class="qty-btn">-</button>
                                <span class="quantity">3</span>
                                <button class="qty-btn">+</button>
                            </div>
                            <span class="price">8.50€</span>
                        </div>
                    </div>
                    <button class="remove-btn">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="cart-summary">
            <div class="summary-row">
                <span>Välisumma</span>
                <span>67.50€</span>
            </div>
            <div class="summary-row">
                <span>Toimitus</span>
                <span>3.90€</span>
            </div>
            <hr>
            <div class="summary-row total">
                <span>Yhteensä</span>
                <span>71.40€</span>
            </div>
        </div>

        <button class="btn-primary checkout-btn">Siirry kassalle</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Koti</span></a>
        <a href="menu.html" class="nav-item"><i class="fas fa-book"></i><span>Menu</span></a>
        <a href="cart.html" class="nav-item active"><i class="fas fa-shopping-cart"></i><span>Kori</span></a>
        <a href="orders.html" class="nav-item"><i class="fas fa-receipt"></i><span>Tilaukset</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Minä</span></a>
    </nav>
</body>
</html>
