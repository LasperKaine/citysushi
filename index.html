<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Sushi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🍣</span> City Sushi
            </div>
        </div>
        
        <div class="header-right">
            <a href="login.html" class="auth-btn btn-login">Kirjaudu</a>
            <a href="register.html" class="auth-btn btn-register">Rekisteröidy</a>
        </div>
    </header>

    <div id="home-screen" class="screen active">
        <div class="hero">
            <h1>Tervetuloa City Sushille!</h1>
            <p>Tuoretta sushia • Maistuvaa ruokaa</p>
            <button class="btn-primary" onclick="window.location.href='menu.html'">Menu</button>
        </div>

        <div class="content">
            <h2 class="section-title">Erityistarjoukset</h2>
            <div class="offers">
                <div class="offer-card">
                    <span class="badge">20% OFF</span>
                    <h3>Special Roll Friday</h3>
                </div>
            </div>

            <h2 class="section-title">Suositellut annokset</h2>
            <div id="recommended" class="horizontal-scroll">
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Koti</span></a>
        <a href="menu.html" class="nav-item"><i class="fas fa-book"></i><span>Menu</span></a>
        <a href="cart.html" class="nav-item"><i class="fas fa-shopping-cart"></i><span>Kori</span></a>
        <a href="orders.html" class="nav-item active"><i class="fas fa-receipt"></i><span>Tilaukset</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Minä</span></a>
    </nav>
</body>
</html>
